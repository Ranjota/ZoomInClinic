// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    ext {
        buildToolsVersion = findProperty('android.buildToolsVersion') ?: '34.0.0'
        minSdkVersion = Integer.parseInt(findProperty('android.minSdkVersion') ?: '23')
        compileSdkVersion = Integer.parseInt(findProperty('android.compileSdkVersion') ?: '34')
        targetSdkVersion = Integer.parseInt(findProperty('android.targetSdkVersion') ?: '34')
        kotlinVersion = findProperty('android.kotlinVersion') ?: '1.9.23'
        ndkVersion = "26.1.10909125"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath('com.android.tools.build:gradle:8.0.2')  // Specify version for better compatibility
        classpath('com.facebook.react:react-native-gradle-plugin:0.74.5')  // Replace with appropriate version if needed
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
    }
}

apply plugin: "com.facebook.react.rootproject"

allprojects {
    repositories {
        maven {
            // Use a safer and more universal method for specifying paths
            def reactNativePath = new File(rootDir, 'node_modules/react-native/android')
            url reactNativePath.toURI()
        }
        maven {
            def jscAndroidPath = new File(rootDir, 'node_modules/jsc-android/dist')
            url jscAndroidPath.toURI()
        }

        google()
        mavenCentral()
        maven { url 'https://www.jitpack.io' }
    }
}
